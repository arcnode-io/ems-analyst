stages:
  - check
  - deploy
  - mirror

checks:
  stage: check
  variables:
    UV_FROZEN: "true"
  script:
    - uv sync --all-packages --dev
    - |
      set -e
      for d in mcp agent server; do
        echo "===== $d ====="
        (cd packages/$d && uv run poe checks)
        (cd packages/$d && uv run pytest --junitxml=../../junit-$d.xml)
        (cd packages/$d && uv run poe cover)
        cp packages/$d/.coverage .coverage.$d
      done
    # Roll the 3 packages' coverage data files into ONE total + ONE
    # cobertura XML so the project badge + MR-diff visualization see
    # the monorepo, not just the last package iterated.
    - |
      echo "===== combined ====="
      uv run coverage combine .coverage.*
      uv run coverage report
      uv run coverage xml -o coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: junit-*.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

deploy:
  stage: deploy
  only: [main]
  needs: [checks]
  script:
    - cd /home/admin/arcnode/ems-analyst && git pull --ff-only && cd /home/admin/docker/ems-analyst-server && docker compose up -d --build --force-recreate

mirror:
  stage: mirror
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - git checkout -B main
    - git push --mirror git@github.com:arcnode-io/ems-analyst.git
  only:
    - main
