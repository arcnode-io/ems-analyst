stages:
  - check
  - aggregate
  - deploy
  - mirror

# Per-package job template. Each concrete job sets PKG=mcp|agent|server;
# checks + tests + coverage run scoped to that package's pyproject. The
# .coverage data file is artifacted so aggregate-coverage can merge.
.checks-template:
  stage: check
  variables:
    UV_FROZEN: "true"
  before_script:
    - uv sync --all-packages --dev
  script:
    - cd packages/$PKG
    - uv run poe checks
    - uv run pytest --junitxml=../../junit-$PKG.xml
    - uv run poe cover
    - cp .coverage ../../.coverage.$PKG
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    paths:
      - .coverage.*
    reports:
      junit: junit-*.xml

checks-mcp:
  extends: .checks-template
  variables:
    PKG: mcp

checks-agent:
  extends: .checks-template
  variables:
    PKG: agent

checks-server:
  extends: .checks-template
  variables:
    PKG: server

# Pulls in the 3 .coverage data files via `needs:` artifacts, merges
# them, and emits one TOTAL line (project-level coverage badge) + one
# cobertura xml (MR-diff visualization for the whole monorepo).
aggregate-coverage:
  stage: aggregate
  needs: [checks-mcp, checks-agent, checks-server]
  variables:
    UV_FROZEN: "true"
  before_script:
    - uv sync --all-packages --dev
  script:
    - ls -la .coverage.*
    - uv run coverage combine .coverage.*
    - uv run coverage report
    - uv run coverage xml -o coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

deploy:
  stage: deploy
  only: [main]
  needs: [aggregate-coverage]
  script:
    - cd /home/admin/arcnode/ems-analyst && git pull --ff-only && cd /home/admin/docker/ems-analyst-server && docker compose up -d --build --force-recreate

mirror:
  stage: mirror
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - git checkout -B main
    - git push --mirror git@github.com:arcnode-io/ems-analyst.git
  only:
    - main
